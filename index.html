<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #111827;
      }

      /* Scene backgrounds fill the full canvas */
      .scene-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
      }

      /* Scene content centered via flex */
      .scene-content {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        padding: 120px 160px;
      }

      .scene-title {
        font-family: Inter, sans-serif;
        font-size: 80px;
        font-weight: 700;
        letter-spacing: -1px;
        text-align: center;
      }

      .scene-label {
        font-family: Inter, sans-serif;
        font-size: 28px;
        font-weight: 400;
        letter-spacing: 4px;
        text-transform: uppercase;
        opacity: 0.6;
        text-align: center;
      }

      /* Lower-third bar */
      #lt-bar {
        position: absolute;
        top: 860px;
        left: 80px;
        width: 600px;
        height: 120px;
        background: #2563eb;
        border-radius: 4px;
      }
      #lt-name {
        position: absolute;
        top: 875px;
        left: 100px;
        font-family: Inter, sans-serif;
        font-size: 36px;
        font-weight: 700;
        color: #ffffff;
      }
      #lt-role {
        position: absolute;
        top: 921px;
        left: 100px;
        font-family: Inter, sans-serif;
        font-size: 24px;
        color: #bfdbfe;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="multi-scene"
      data-start="0"
      data-duration="12"
      data-width="1920"
      data-height="1080"
    >

      <!-- ── Scene 1: 0 – 4s ─────────────────────────────────────── -->
      <div
        id="scene1-bg"
        class="clip scene-bg"
        data-start="0"
        data-duration="4"
        data-track-index="0"
        style="background: #1e3a5f;"
      ></div>

      <div
        id="scene1-content"
        class="clip scene-content"
        data-start="0"
        data-duration="4"
        data-track-index="1"
      >
        <div class="scene-label" style="color: #60a5fa;">Scene</div>
        <div class="scene-title" style="color: #60a5fa;" id="scene1-title">Scene One</div>
      </div>

      <!-- ── Scene 2: 4 – 8s ─────────────────────────────────────── -->
      <div
        id="scene2-bg"
        class="clip scene-bg"
        data-start="6.01"
        data-duration="4"
        data-track-index="0"
        style="background: #1a3a2a;"
      ></div>

      <div
        id="scene2-content"
        class="clip scene-content"
        data-start="4"
        data-duration="4"
        data-track-index="1"
      >
        <div class="scene-label" style="color: #34d399;">Scene</div>
        <div class="scene-title" style="color: #34d399;" id="scene2-title">Scene Two</div>
      </div>

      <!-- ── Scene 3: 8 – 12s ────────────────────────────────────── -->
      <div
        id="scene3-bg"
        class="clip scene-bg"
        data-start="3.67"
        data-duration="4"
        data-track-index="-1"
        style="background: #3a1a2a;"
      ></div>

      <div
        id="scene3-content"
        class="clip scene-content"
        data-start="8"
        data-duration="4"
        data-track-index="1"
      >
        <div class="scene-label" style="color: #f472b6;">Scene</div>
        <div class="scene-title" style="color: #f472b6;" id="scene3-title">Scene Three</div>
      </div>

      <!-- ── Lower Third (lower-third test case): 1 – 7s ────────── -->
      <div
        id="lt-bar"
        class="clip"
        data-start="1"
        data-duration="6"
        data-track-index="2"
      ></div>
      <div
        id="lt-name"
        class="clip"
        data-start="7.32"
        data-duration="4.68"
        data-track-index="4"
      >Rajesh Kumar</div>
      <div
        id="lt-role"
        class="clip"
        data-start="1.4"
        data-duration="3.88"
        data-track-index="4"
      >Video Engineering Lead</div>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // ── Scene 1 entrance (no exit — framework handles clip visibility) ──
      tl.from("#scene1-bg",      { opacity: 0, duration: 0.5, ease: "power2.out" }, 0.1);
      tl.from("#scene1-content", { y: 40, opacity: 0, duration: 0.6, ease: "power3.out" }, 0.2);

      // ── Scene 2 entrance ──
      tl.from("#scene2-bg",      { opacity: 0, duration: 0.5, ease: "power2.out" }, 4.1);
      tl.from("#scene2-content", { y: 40, opacity: 0, duration: 0.6, ease: "expo.out" }, 4.2);

      // ── Scene 3 entrance ──
      tl.from("#scene3-bg",      { opacity: 0, duration: 0.5, ease: "power2.out" }, 8.1);
      tl.from("#scene3-content", { y: 40, opacity: 0, duration: 0.6, ease: "back.out(1.5)" }, 8.2);

      // Final scene fade out
      tl.to("#scene3-bg",      { opacity: 0, duration: 0.4, ease: "power2.in" }, 11.5);
      tl.to("#scene3-content", { opacity: 0, duration: 0.4, ease: "power2.in" }, 11.5);

      // ── Lower Third entrance / exit ──
      tl.from("#lt-bar",  { x: -40, opacity: 0, duration: 0.4, ease: "power3.out" }, 1.0);
      tl.from("#lt-name", { x: -20, opacity: 0, duration: 0.35, ease: "power2.out" }, 1.2);
      tl.from("#lt-role", { x: -20, opacity: 0, duration: 0.3, ease: "power2.out" }, 1.4);
      tl.to("#lt-bar",    { x: -40, opacity: 0, duration: 0.3, ease: "power2.in" }, 6.7);
      tl.to("#lt-name",   { opacity: 0, duration: 0.25, ease: "power2.in" }, 6.7);
      tl.to("#lt-role",   { opacity: 0, duration: 0.25, ease: "power2.in" }, 6.7);

      window.__timelines["multi-scene"] = tl;
    </script>
  </body>
</html>
